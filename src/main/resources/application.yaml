spring:
  application:
    name: Craftly
    description: AI_CODE GENERATION Platform
  config:
    import: optional:file:./.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:9000}/${DB_NAME:testDB}
    username: ${DB_USERNAME:testUser}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true


jwt:
  secret-key: ${JWT_SECRET_KEY}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9001}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:craftly-projects}

gemini:
  api-key: ${GEMINI_API_KEY}

qdrant:
  url: ${QDRANT_URL}
  api-key: ${QDRANT_API_KEY:}
  collection: ${QDRANT_COLLECTION}
